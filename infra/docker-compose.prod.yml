services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: neuroflow
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      target: runtime
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL

  api:
    build:
      context: ../backend
      target: runtime
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../backend
      target: runtime
    command: python -m worker
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
